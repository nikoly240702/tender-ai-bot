name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      BOT_TOKEN: "1234567890:FAKE_TOKEN_FOR_CI"
      OPENAI_API_KEY: "sk-fake-key-for-ci"
      ADMIN_USER_ID: "0"
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          # Install project deps, skip heavy optional ones
          pip install -r requirements.txt --ignore-requires-python || true
          pip install aiogram sqlalchemy asyncpg alembic

      - name: Lint with ruff
        run: |
          ruff check tender_sniper/ bot/ --select E,F,W --ignore E501,E402,W291,W293 --exit-zero

      - name: Compile-check all Python files
        run: |
          find tender_sniper bot -name "*.py" -print0 | xargs -0 python3 -m py_compile

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --timeout=30
