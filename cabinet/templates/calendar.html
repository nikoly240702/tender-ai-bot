{% extends "_base.html" %}
{% block title %}Календарь — Tender Sniper{% endblock %}
{% block page_css %}<link rel="stylesheet" href="/cabinet/static/css/pages/calendar.css?v=6">{% endblock %}

{% block main %}
<div class="page-header">
  <div class="eyebrow">Работа</div>
  <h1>Календарь дедлайнов</h1>
  <div class="summary">Сроки подачи заявок по вашим тендерам.</div>
</div>

<div class="cal-header">
  <div class="month-label" id="month-label">—</div>
  <div class="nav">
    <button class="btn btn-secondary" id="prev-month">←</button>
    <button class="btn btn-secondary" id="next-month">→</button>
  </div>
</div>

<div class="calendar">
  <div class="cal-dow">
    <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="day-details" id="day-details" style="display:none">
  <h3 id="day-details-title">—</h3>
  <div id="day-details-body"></div>
</div>
{% endblock %}

{% block page_js %}<script src="/cabinet/static/js/pages/calendar.js?v=6"></script>{% endblock %}
