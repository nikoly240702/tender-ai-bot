<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подписка — Tender Sniper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0e17;--bg2:#111623;--bg3:#181e2e;--surface:rgba(255,255,255,0.04);--line:rgba(255,255,255,0.07);--gold:#d4a853;--gold-dim:rgba(212,168,83,0.12);--gold-line:rgba(212,168,83,0.25);--white:#f0f0f0;--gray:#6b7a90;--gray2:#99a8b8;--green:#3dd68c;--red:#e74c3c;--sidebar-w:240px}
    body{background:var(--bg);color:var(--white);font-family:'Manrope',system-ui,sans-serif;font-size:15px;line-height:1.55;display:flex;min-height:100vh}
    .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto}
    .sidebar .logo{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900;margin-bottom:32px;padding:0 8px}.sidebar .logo span{color:var(--gold)}
    .sidebar nav{flex:1}
    .sidebar a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--gray2);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.15s;margin-bottom:2px}
    .sidebar a:hover{background:var(--surface);color:var(--white)}.sidebar a.active{background:var(--gold-dim);color:var(--gold)}
    .sidebar .icon{width:20px;text-align:center}
    .sidebar .bottom{border-top:1px solid var(--line);padding-top:16px;margin-top:auto}.sidebar .bottom a{color:var(--gray);font-size:13px}
    .main{margin-left:var(--sidebar-w);flex:1;padding:32px 40px;max-width:1100px}
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
    .page-header p{color:var(--gray2);font-size:14px}
    .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:16px}
    .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
    .badge-green{background:rgba(61,214,140,0.15);color:var(--green)}
    .badge-gold{background:var(--gold-dim);color:var(--gold)}
    .badge-gray{background:var(--surface);color:var(--gray2)}
    .badge-red{background:rgba(231,76,60,0.15);color:var(--red)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;text-decoration:none}
    .btn-gold{background:var(--gold);color:#0a0e17}.btn-gold:hover{opacity:0.9}
    .btn-outline{background:transparent;border:1px solid var(--line);color:var(--white)}.btn-outline:hover{border-color:var(--gold-line);color:var(--gold)}
    .loading{text-align:center;padding:40px;color:var(--gray)}
    .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;background:var(--bg3);border:1px solid var(--gold-line);color:var(--white);font-size:14px;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none}.toast.show{opacity:1;pointer-events:auto}

    /* Current subscription */
    .current-sub{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
    .current-sub .tier-name{font-size:18px;font-weight:700}
    .current-sub .tier-details{color:var(--gray2);font-size:13px}
    .days-left{font-size:13px;padding:4px 12px;border-radius:20px;background:var(--gold-dim);color:var(--gold);font-weight:600}
    .days-left.expired{background:rgba(231,76,60,0.15);color:var(--red)}

    /* Tier cards */
    .tiers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:28px}
    .tier-card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:28px 24px;display:flex;flex-direction:column;transition:border-color 0.2s}
    .tier-card:hover{border-color:var(--gold-line)}
    .tier-card.recommended{border-color:var(--gold-line);position:relative}
    .tier-card.recommended::before{content:'Рекомендуем';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0e17;font-size:11px;font-weight:700;padding:2px 12px;border-radius:10px}
    .tier-card .tier-emoji{font-size:32px;margin-bottom:12px}
    .tier-card .tier-title{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
    .tier-card .tier-price{font-size:28px;font-weight:700;margin-bottom:4px}
    .tier-card .tier-price span{font-size:14px;font-weight:400;color:var(--gray2)}
    .tier-card .tier-price .old-price{text-decoration:line-through;color:var(--gray);font-size:16px;margin-right:8px}
    .tier-card .tier-period{color:var(--gray2);font-size:13px;margin-bottom:16px}
    .tier-card .tier-features{flex:1;margin-bottom:20px}
    .tier-card .tier-features li{list-style:none;padding:5px 0;font-size:13px;color:var(--gray2)}
    .tier-card .tier-features li::before{content:'\2713  ';color:var(--green);font-weight:700}
    .tier-card .tier-btn{width:100%;justify-content:center}

    /* Period selector */
    .period-selector{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .period-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--line);color:var(--gray2);font-size:13px;font-weight:600;cursor:pointer;background:transparent;font-family:'Manrope',sans-serif;transition:all 0.15s;position:relative}
    .period-btn:hover{border-color:var(--gold-line);color:var(--gold)}
    .period-btn.active{background:var(--gold-dim);border-color:var(--gold-line);color:var(--gold)}
    .period-btn .period-badge{position:absolute;top:-8px;right:-4px;background:var(--red);color:white;font-size:9px;padding:1px 6px;border-radius:8px;white-space:nowrap}

    @media(max-width:768px){
      .sidebar{width:0;overflow:hidden;padding:0}
      .main{margin-left:0;padding:16px}
      .tiers-grid{grid-template-columns:1fr}
    }
    @media(max-width:1024px) and (min-width:769px){
      .tiers-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">TENDER<span>SNIPER</span></div>
    <nav>
      <a href="/cabinet/"><span class="icon">📊</span> Тендеры</a>
      <a href="/cabinet/search"><span class="icon">🔍</span> Поиск</a>
      <a href="/cabinet/gpt"><span class="icon">🤖</span> Tender-GPT</a>
      <a href="/cabinet/filters"><span class="icon">🎯</span> Фильтры</a>
      <a href="/cabinet/documents"><span class="icon">📄</span> Документы</a>
      <a href="/cabinet/profile"><span class="icon">🏢</span> Профиль</a>
      <a href="/cabinet/stats"><span class="icon">📈</span> Статистика</a>
      <a href="/cabinet/calendar"><span class="icon">📅</span> Календарь</a>
      <a href="/cabinet/settings"><span class="icon">⚙️</span> Настройки</a>
      <a href="/cabinet/subscription" class="active"><span class="icon">💳</span> Подписка</a>
    </nav>
    <div class="bottom">
      <a href="https://t.me/TenderSniperBot">Бот в Telegram</a>
      <a href="/cabinet/logout">Выйти</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Подписка</h1>
      <p>Управление тарифом и оплата</p>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      Загрузка...
    </div>

    <div id="content" style="display:none">
      <!-- Current subscription -->
      <div class="card" id="current-card">
        <div class="current-sub" id="current-sub"></div>
      </div>

      <!-- Period selector -->
      <div style="margin-bottom:8px;font-size:13px;color:var(--gray2);font-weight:600">Период подписки:</div>
      <div class="period-selector" id="period-selector">
        <button class="period-btn active" data-months="1" onclick="selectPeriod(1)">1 месяц</button>
        <button class="period-btn" data-months="3" onclick="selectPeriod(3)">3 месяца <span class="period-badge">-10%</span></button>
        <button class="period-btn" data-months="6" onclick="selectPeriod(6)">6 месяцев <span class="period-badge">-20%</span></button>
      </div>

      <!-- Tier cards -->
      <div class="tiers-grid" id="tiers-grid"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, dur) {
      dur = dur || 3000;
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, dur);
    }

    var subData = null;
    var selectedMonths = 1;

    // Tier feature lists (static, trusted content)
    var TIER_FEATURES = {
      trial: ['3 фильтра мониторинга', '50 уведомлений/день', 'Мгновенный поиск', 'Избранное', '7 дней бесплатно'],
      starter: ['5 фильтров мониторинга', '50 уведомлений/день', 'Мгновенный поиск', 'Избранное', 'Telegram-поддержка'],
      pro: ['15 фильтров мониторинга', 'Безлимит уведомлений', 'AI-анализ (500/мес)', 'Tender-GPT (50 сообщ/мес)', 'Архивный поиск'],
      premium: ['30 фильтров мониторинга', 'Безлимит уведомлений', 'Безлимит AI-анализ', 'Tender-GPT (200 сообщ/мес)', 'Расширенные настройки', 'Приоритетная поддержка']
    };

    var TIER_NAMES = {trial: 'Пробный период', starter: 'Starter', pro: 'Pro', premium: 'Business'};
    var TIER_EMOJI = {trial: '\ud83c\udf81', starter: '\u2b50', pro: '\ud83d\ude80', premium: '\ud83d\udc8e'};
    var FIXED_PRICES = {starter: {1: 499, 3: 1397, 6: 2694}, pro: {1: 1490, 3: 4017, 6: 7449}, premium: {1: 2990, 3: 8073, 6: 14951}};
    var FIRST_MONTH = {pro: 990, premium: 1990};

    function selectPeriod(months) {
      selectedMonths = months;
      document.querySelectorAll('.period-btn').forEach(function(b) {
        b.classList.toggle('active', parseInt(b.dataset.months) === months);
      });
      renderTiers();
    }

    function fmtRub(n) {
      return n.toLocaleString('ru-RU') + ' \u20BD';
    }

    function renderCurrentSub() {
      var el = document.getElementById('current-sub');
      if (!subData) return;

      var tier = subData.tier || 'trial';
      var daysLeft = subData.days_left || 0;
      var expiresAt = subData.expires_at;

      // Build DOM safely
      el.textContent = '';

      var infoDiv = document.createElement('div');
      var nameDiv = document.createElement('div');
      nameDiv.className = 'tier-name';
      nameDiv.textContent = (TIER_EMOJI[tier] || '') + ' ' + (TIER_NAMES[tier] || tier);
      infoDiv.appendChild(nameDiv);

      if (expiresAt) {
        var detailsDiv = document.createElement('div');
        detailsDiv.className = 'tier-details';
        detailsDiv.textContent = 'до ' + new Date(expiresAt).toLocaleDateString('ru-RU');
        infoDiv.appendChild(detailsDiv);
      }
      el.appendChild(infoDiv);

      var badge = document.createElement('span');
      badge.className = daysLeft > 7 ? 'days-left' : 'days-left expired';
      badge.textContent = daysLeft > 0 ? (daysLeft + ' дн. осталось') : 'Истёк';
      el.appendChild(badge);
    }

    function createTierCard(opts) {
      var card = document.createElement('div');
      card.className = 'tier-card' + (opts.recommended ? ' recommended' : '');

      var emoji = document.createElement('div');
      emoji.className = 'tier-emoji';
      emoji.textContent = opts.emoji;
      card.appendChild(emoji);

      var title = document.createElement('div');
      title.className = 'tier-title';
      title.textContent = opts.title;
      card.appendChild(title);

      var priceDiv = document.createElement('div');
      priceDiv.className = 'tier-price';
      if (opts.oldPrice) {
        var old = document.createElement('span');
        old.className = 'old-price';
        old.textContent = fmtRub(opts.oldPrice);
        priceDiv.appendChild(old);
      }
      priceDiv.appendChild(document.createTextNode(fmtRub(opts.price)));
      if (opts.priceSuffix) {
        var suf = document.createElement('span');
        suf.textContent = ' ' + opts.priceSuffix;
        priceDiv.appendChild(suf);
      }
      card.appendChild(priceDiv);

      var period = document.createElement('div');
      period.className = 'tier-period';
      if (opts.periodColor) period.style.color = opts.periodColor;
      period.textContent = opts.period;
      card.appendChild(period);

      var ul = document.createElement('ul');
      ul.className = 'tier-features';
      opts.features.forEach(function(f) {
        var li = document.createElement('li');
        li.textContent = f;
        ul.appendChild(li);
      });
      card.appendChild(ul);

      var btn = document.createElement('button');
      btn.className = 'btn ' + (opts.btnClass || 'btn-gold') + ' tier-btn';
      btn.textContent = opts.btnText;
      if (opts.btnDisabled) btn.disabled = true;
      if (opts.btnClick) btn.addEventListener('click', opts.btnClick);
      card.appendChild(btn);

      return card;
    }

    function renderTiers() {
      var grid = document.getElementById('tiers-grid');
      grid.textContent = '';
      var isFirst = subData ? subData.is_first_payment : false;

      // Starter
      var starterPrice = FIXED_PRICES.starter[selectedMonths];
      grid.appendChild(createTierCard({
        emoji: '\u2b50', title: 'Starter',
        price: starterPrice,
        priceSuffix: selectedMonths > 1 ? ('za ' + selectedMonths + ' \u043c\u0435\u0441.') : '/\u043c\u0435\u0441',
        period: selectedMonths + ' \u043c\u0435\u0441.',
        features: TIER_FEATURES.starter,
        btnText: '\u041e\u043f\u043b\u0430\u0442\u0438\u0442\u044c ' + fmtRub(starterPrice),
        btnClick: function() { pay('starter', selectedMonths); }
      }));

      // Pro
      var proPrice = FIXED_PRICES.pro[selectedMonths];
      var proDiscount = isFirst && selectedMonths === 1;
      var proFinal = proDiscount ? FIRST_MONTH.pro : proPrice;
      grid.appendChild(createTierCard({
        emoji: '\ud83d\ude80', title: 'Pro', recommended: true,
        price: proFinal,
        oldPrice: proDiscount ? 1490 : null,
        priceSuffix: selectedMonths > 1 ? ('\u0437\u0430 ' + selectedMonths + ' \u043c\u0435\u0441.') : '/\u043c\u0435\u0441',
        period: proDiscount ? '\u0421\u043a\u0438\u0434\u043a\u0430 \u043f\u0435\u0440\u0432\u043e\u0433\u043e \u043c\u0435\u0441\u044f\u0446\u0430!' : (selectedMonths + ' \u043c\u0435\u0441.'),
        periodColor: proDiscount ? 'var(--green)' : null,
        features: TIER_FEATURES.pro,
        btnText: '\u041e\u043f\u043b\u0430\u0442\u0438\u0442\u044c ' + fmtRub(proFinal),
        btnClick: function() { pay('pro', selectedMonths); }
      }));

      // Business (premium)
      var premPrice = FIXED_PRICES.premium[selectedMonths];
      var premDiscount = isFirst && selectedMonths === 1;
      var premFinal = premDiscount ? FIRST_MONTH.premium : premPrice;
      grid.appendChild(createTierCard({
        emoji: '\ud83d\udc8e', title: 'Business',
        price: premFinal,
        oldPrice: premDiscount ? 2990 : null,
        priceSuffix: selectedMonths > 1 ? ('\u0437\u0430 ' + selectedMonths + ' \u043c\u0435\u0441.') : '/\u043c\u0435\u0441',
        period: premDiscount ? '\u0421\u043a\u0438\u0434\u043a\u0430 \u043f\u0435\u0440\u0432\u043e\u0433\u043e \u043c\u0435\u0441\u044f\u0446\u0430!' : (selectedMonths + ' \u043c\u0435\u0441.'),
        periodColor: premDiscount ? 'var(--green)' : null,
        features: TIER_FEATURES.premium,
        btnText: '\u041e\u043f\u043b\u0430\u0442\u0438\u0442\u044c ' + fmtRub(premFinal),
        btnClick: function() { pay('premium', selectedMonths); }
      }));
    }

    async function loadSubscription() {
      try {
        var resp = await fetch('/cabinet/api/subscription');
        if (resp.status === 401) { location.href = '/cabinet/login'; return; }
        subData = await resp.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        renderCurrentSub();
        renderTiers();
      } catch (e) {
        showToast('Ошибка загрузки: ' + e.message);
      }
    }

    async function pay(tier, months) {
      showToast('Создание платежа...');
      try {
        var resp = await fetch('/cabinet/api/subscription/pay', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({tier: tier, months: months}),
        });

        if (resp.status === 401) { location.href = '/cabinet/login'; return; }
        var data = await resp.json();

        if (data.error) {
          showToast(data.error);
          return;
        }

        if (data.url) {
          window.open(data.url, '_blank');
          showToast('Откроется страница оплаты...');
        } else {
          showToast('Не удалось создать платёж');
        }
      } catch (e) {
        showToast('Ошибка: ' + e.message);
      }
    }

    loadSubscription();
  </script>
</body>
</html>
