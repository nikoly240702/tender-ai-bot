<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь — Tender Sniper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0e17;--bg2:#111623;--bg3:#181e2e;--surface:rgba(255,255,255,0.04);--line:rgba(255,255,255,0.07);--gold:#d4a853;--gold-dim:rgba(212,168,83,0.12);--gold-line:rgba(212,168,83,0.25);--white:#f0f0f0;--gray:#6b7a90;--gray2:#99a8b8;--green:#3dd68c;--red:#e74c3c;--sidebar-w:240px}
    body{background:var(--bg);color:var(--white);font-family:'Manrope',system-ui,sans-serif;font-size:15px;line-height:1.55;display:flex;min-height:100vh}
    .sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--line);padding:24px 16px;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto}
    .sidebar .logo{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900;margin-bottom:32px;padding:0 8px}.sidebar .logo span{color:var(--gold)}
    .sidebar nav{flex:1}
    .sidebar a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--gray2);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.15s;margin-bottom:2px}
    .sidebar a:hover{background:var(--surface);color:var(--white)}.sidebar a.active{background:var(--gold-dim);color:var(--gold)}
    .sidebar .icon{width:20px;text-align:center}
    .sidebar .bottom{border-top:1px solid var(--line);padding-top:16px;margin-top:auto}.sidebar .bottom a{color:var(--gray);font-size:13px}
    .main{margin-left:var(--sidebar-w);flex:1;padding:32px 40px;max-width:1000px}
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
    .page-header p{color:var(--gray2);font-size:14px}
    .card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:16px}
    .loading{text-align:center;padding:40px;color:var(--gray)}
    .spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;background:var(--bg3);border:1px solid var(--gold-line);color:var(--white);font-size:14px;z-index:1000;opacity:0;transition:opacity 0.3s;pointer-events:none}.toast.show{opacity:1;pointer-events:auto}

    /* Calendar nav */
    .cal-nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
    .cal-nav button{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);color:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .cal-nav button:hover{border-color:var(--gold-line);color:var(--gold)}
    .cal-nav .cal-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;min-width:200px;text-align:center}

    /* Calendar grid */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-weekday{text-align:center;font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;padding:8px 0;letter-spacing:0.5px}
    .cal-day{min-height:80px;border-radius:8px;background:var(--bg3);border:1px solid transparent;padding:8px;cursor:default;transition:all 0.15s;position:relative}
    .cal-day.empty{background:transparent;border:none;cursor:default}
    .cal-day.has-tenders{border-color:var(--gold-line);cursor:pointer}
    .cal-day.has-tenders:hover{background:var(--gold-dim)}
    .cal-day.today{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold)}
    .cal-day.past{opacity:0.45}
    .cal-day .day-num{font-size:14px;font-weight:600;margin-bottom:4px}
    .cal-day .day-count{display:inline-block;background:var(--gold-dim);color:var(--gold);font-size:11px;font-weight:700;padding:1px 6px;border-radius:8px}
    .cal-day.today .day-num{color:var(--gold)}

    /* Modal */
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:900;display:none;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--line);border-radius:14px;max-width:600px;width:90%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .modal-header h2{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700}
    .modal-close{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);color:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
    .modal-close:hover{border-color:var(--gold-line);color:var(--gold)}
    .modal-body{padding:16px 24px;overflow-y:auto;flex:1}
    .tender-item{padding:14px 0;border-bottom:1px solid var(--line)}
    .tender-item:last-child{border-bottom:none}
    .tender-item .t-name{font-size:14px;font-weight:600;margin-bottom:4px}
    .tender-item .t-name a{color:var(--white);text-decoration:none}
    .tender-item .t-name a:hover{color:var(--gold)}
    .tender-item .t-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--gray2)}
    .tender-item .t-price{color:var(--gold);font-weight:600}

    @media(max-width:768px){
      .sidebar{width:0;overflow:hidden;padding:0}
      .main{margin-left:0;padding:16px}
      .cal-day{min-height:56px;padding:6px}
      .cal-day .day-num{font-size:12px}
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">TENDER<span>SNIPER</span></div>
    <nav>
      <a href="/cabinet/"><span class="icon">📊</span> Тендеры</a>
      <a href="/cabinet/search"><span class="icon">🔍</span> Поиск</a>
      <a href="/cabinet/gpt"><span class="icon">🤖</span> Tender-GPT</a>
      <a href="/cabinet/filters"><span class="icon">🎯</span> Фильтры</a>
      <a href="/cabinet/documents"><span class="icon">📄</span> Документы</a>
      <a href="/cabinet/profile"><span class="icon">🏢</span> Профиль</a>
      <a href="/cabinet/stats"><span class="icon">📈</span> Статистика</a>
      <a href="/cabinet/calendar" class="active"><span class="icon">📅</span> Календарь</a>
      <a href="/cabinet/settings"><span class="icon">⚙️</span> Настройки</a>
      <a href="/cabinet/subscription"><span class="icon">💳</span> Подписка</a>
    </nav>
    <div class="bottom">
      <a href="https://t.me/TenderSniperBot">Бот в Telegram</a>
      <a href="/cabinet/logout">Выйти</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Календарь дедлайнов</h1>
      <p>Сроки подачи заявок по вашим тендерам</p>
    </div>

    <div class="card">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)" title="Предыдущий месяц">&#8592;</button>
        <div class="cal-title" id="cal-title"></div>
        <button onclick="changeMonth(1)" title="Следующий месяц">&#8594;</button>
      </div>
      <div class="loading" id="loading" style="display:none">
        <div class="spinner"></div>
        Загрузка...
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </main>

  <!-- Day detail modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Тендеры</h2>
        <button class="modal-close" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, dur) {
      dur = dur || 3000;
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, dur);
    }

    var MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    var WEEKDAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

    var currentYear, currentMonth;
    var calendarData = {}; // {date_str: {count, tenders}}

    function init() {
      var now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth(); // 0-based
      loadMonth();
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      loadMonth();
    }

    async function loadMonth() {
      var monthStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0');
      document.getElementById('cal-title').textContent = MONTHS_RU[currentMonth] + ' ' + currentYear;
      document.getElementById('loading').style.display = 'block';

      try {
        var resp = await fetch('/cabinet/api/calendar?month=' + monthStr);
        if (resp.status === 401) { location.href = '/cabinet/login'; return; }
        var data = await resp.json();

        calendarData = {};
        if (data.days) {
          data.days.forEach(function(d) {
            calendarData[d.date] = {count: d.count, tenders: d.tenders};
          });
        }

        document.getElementById('loading').style.display = 'none';
        renderCalendar();
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        showToast('Ошибка загрузки: ' + e.message);
      }
    }

    function renderCalendar() {
      var grid = document.getElementById('cal-grid');
      grid.textContent = '';

      // Weekday headers
      WEEKDAYS.forEach(function(wd) {
        var cell = document.createElement('div');
        cell.className = 'cal-weekday';
        cell.textContent = wd;
        grid.appendChild(cell);
      });

      // First day of month (0=Sun, convert to Mon-based)
      var firstDay = new Date(currentYear, currentMonth, 1).getDay();
      var startOffset = (firstDay + 6) % 7; // Monday=0

      var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

      // Empty cells before first day
      for (var i = 0; i < startOffset; i++) {
        var empty = document.createElement('div');
        empty.className = 'cal-day empty';
        grid.appendChild(empty);
      }

      // Day cells
      for (var day = 1; day <= daysInMonth; day++) {
        var dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        var dayData = calendarData[dateStr];
        var isToday = dateStr === todayStr;
        var isPast = new Date(dateStr) < new Date(todayStr);

        var cell = document.createElement('div');
        cell.className = 'cal-day';
        if (dayData && dayData.count > 0) cell.className += ' has-tenders';
        if (isToday) cell.className += ' today';
        if (isPast && !isToday) cell.className += ' past';

        var numEl = document.createElement('div');
        numEl.className = 'day-num';
        numEl.textContent = day;
        cell.appendChild(numEl);

        if (dayData && dayData.count > 0) {
          var countEl = document.createElement('span');
          countEl.className = 'day-count';
          countEl.textContent = dayData.count + ' тенд.';
          cell.appendChild(countEl);

          (function(ds, dd) {
            cell.addEventListener('click', function() { openModal(ds, dd); });
          })(dateStr, dayData);
        }

        grid.appendChild(cell);
      }
    }

    function fmtPrice(p) {
      if (!p) return '';
      var n = parseFloat(p);
      if (n >= 1e6) return (n / 1e6).toFixed(2) + ' млн';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + ' тыс.';
      return n.toFixed(0) + ' руб.';
    }

    function openModal(dateStr, dayData) {
      var parts = dateStr.split('-');
      var dayNum = parseInt(parts[2]);
      document.getElementById('modal-title').textContent = dayNum + ' ' + MONTHS_RU[currentMonth] + ' — дедлайны (' + dayData.count + ')';

      var body = document.getElementById('modal-body');
      body.textContent = '';

      if (!dayData.tenders || dayData.tenders.length === 0) {
        var empty = document.createElement('div');
        empty.style.cssText = 'text-align:center;padding:20px;color:var(--gray)';
        empty.textContent = 'Нет тендеров';
        body.appendChild(empty);
      } else {
        dayData.tenders.forEach(function(t) {
          var item = document.createElement('div');
          item.className = 'tender-item';

          var nameDiv = document.createElement('div');
          nameDiv.className = 't-name';
          if (t.url) {
            var link = document.createElement('a');
            link.href = t.url;
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = (t.name || 'Тендер').substring(0, 80);
            nameDiv.appendChild(link);
          } else {
            nameDiv.textContent = (t.name || 'Тендер').substring(0, 80);
          }
          item.appendChild(nameDiv);

          var metaDiv = document.createElement('div');
          metaDiv.className = 't-meta';

          if (t.number) {
            var numSpan = document.createElement('span');
            numSpan.textContent = 'No ' + t.number;
            metaDiv.appendChild(numSpan);
          }

          if (t.price) {
            var priceSpan = document.createElement('span');
            priceSpan.className = 't-price';
            priceSpan.textContent = fmtPrice(t.price);
            metaDiv.appendChild(priceSpan);
          }

          if (t.deadline_time) {
            var timeSpan = document.createElement('span');
            timeSpan.textContent = 'до ' + t.deadline_time;
            metaDiv.appendChild(timeSpan);
          }

          item.appendChild(metaDiv);
          body.appendChild(item);
        });
      }

      document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-overlay') && !e.target.classList.contains('modal-close')) return;
      document.getElementById('modal-overlay').classList.remove('show');
    }

    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    init();
  </script>
</body>
</html>
